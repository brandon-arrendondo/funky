# funky configuration
# All keys are optional — defaults shown below.

[indent]
style = "spaces"   # "spaces" or "tabs"
width = 4          # spaces per indent level (or tab display width)
indent_switch_case  = true   # indent case/default labels inside switch (matches uncrustify indent_switch_case)
indent_goto_labels  = false  # false: goto labels at column 0 (uncrustify indent_label = 1); true: indent normally

[braces]
style = "kr"       # "kr" (same line), "allman" (own line), "stroustrup"
cuddle_else         = false
cuddle_catch        = true
collapse_empty_body = true
fn_brace_newline    = true   # true: function-def { on its own line; false: follow style
extern_c_brace      = "force_same_line"  # "force_same_line" (Google/LLVM) or "preserve" (match uncrustify default)
add_braces_to_if    = false  # add { } around braceless if bodies (uncrustify mod_full_brace_if = add)
add_braces_to_while = false  # add { } around braceless while bodies (mod_full_brace_while = add)
add_braces_to_for   = false  # add { } around braceless for bodies (mod_full_brace_for = add)

[spacing]
space_before_call_paren    = false  # foo(  vs  foo (
space_before_keyword_paren = true   # if (  vs  if(
space_after_comma          = true
space_around_binary_ops    = true
space_inside_parens        = false
space_inside_brackets      = false
space_after_cast           = false
pointer_align              = "name"    # "type" (int* p), "name" (int *p), "middle" (int * p)
space_inside_angle_brackets = false    # false: vector<int>   true: vector< int >
align_right_cmt_span       = 3        # 0: off; ≥1: column-align trailing // and /* comments
align_right_cmt_style      = "groups" # "groups": align multi-line groups only (matches uncrustify default); "all": normalize every trailing comment to min_gap
align_enum_equ_span        = 1        # 0: off; ≥1: align enum = signs within span
align_doxygen_cmt_span     = 1        # 0: off; ≥1: column-align /**< member comments
align_on_tabstop           = true     # snap alignment columns to next indent-width multiple (matches uncrustify align_on_tabstop=TRUE); set false for raw column

[newlines]
style           = "lf"   # "lf", "crlf", "native"
max_blank_lines = 2
final_newline   = true
blank_line_after_var_decl_block = true   # insert blank line after leading var decls in a function
blank_line_after_open_brace     = false  # insert blank line after { in function/block bodies
merge_line_comment              = false  # hoist standalone // comment onto preceding {/}/; line
nl_brace_else                   = false  # true: newline before else/else-if (overrides cuddle_else), matches uncrustify nl_brace_else=add

[preprocessor]
pp_indent             = false  # indent #include/#define/nested #if relative to #if nesting depth (uncrustify pp_indent = add)
endif_comment_space   = 2     # spaces between `#endif` and a trailing /* comment */ (uncrustify default); set to 1 for tighter style

[comments]
normalize_block_comment_closing = false  # false: preserve bare */ (uncrustify default); true: rewrite to ` */` to match ` *` continuation style
